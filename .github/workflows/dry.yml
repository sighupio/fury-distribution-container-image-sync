name: "Dry run"

on:
  push:
    paths:
      - '.github/workflows/dry.yml'
      - 'modules/**'
      - '!README.md'

env:
  DRY_RUN: true

jobs:
  get_modules:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@master
      - name: fetch available modules
        uses: ./.github/actions/get-modules
        id: get_modules_as_string
    outputs:
      modules: ${{ steps.get_modules_as_string.outputs.modules }}
  image_lists:
    runs-on: ubuntu-24.04
    needs: get_modules
    steps:
      - uses: actions/checkout@master
      - name: generate KFD image build and sync list
        id: generate_image_lists
        uses: ./.github/actions/generate-build-sync-image-lists
        with:
          modules: ${{ needs.get_modules.outputs.modules }}
    outputs:
      image_to_build: ${{ steps.generate_image_lists.outputs.image_to_build }}
      image_to_sync250: ${{ steps.generate_image_lists.outputs.image_to_sync250 }}
      image_to_sync500: ${{ steps.generate_image_lists.outputs.image_to_sync500 }}
      image_to_sync750: ${{ steps.generate_image_lists.outputs.image_to_sync750 }}
      image_to_sync1000: ${{ steps.generate_image_lists.outputs.image_to_sync1000 }}
      image_to_sync1250: ${{ steps.generate_image_lists.outputs.image_to_sync1250 }}
      image_to_sync1500: ${{ steps.generate_image_lists.outputs.image_to_sync1500 }}
  sync250:
    runs-on: ubuntu-24.04
    needs:
      - image_lists
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.image_lists.outputs.image_to_sync250) }}
    container:
      image: quay.io/skopeo/stable:v1.16.1
    steps:
      - uses: actions/checkout@master
      - name: Login to registries
        run: |
          skopeo login --username ${{ secrets.DOCKERHUB_USERNAME }} --password ${{ secrets.DOCKERHUB_PASSWORD }} docker.io
          skopeo login --username ${{ secrets.SIGHUP_REGISTRY_USERNAME }} --password ${{ secrets.SIGHUP_REGISTRY_PASSWORD }} registry.sighup.io
        env:
          REGISTRY_AUTH_FILE: /tmp/auth.json
      - name: sync images with skopeo
        uses: ./.github/actions/skopeo-sync
        with:
          source: ${{ matrix.image.source }}
          tag: ${{ matrix.image.tag }}
          destination: ${{ matrix.image.destination }}
          multi-arch: ${{ matrix.image.multi-arch }}
          registry_auth_file: /tmp/auth.json
          dry_run: ${{ env.DRY_RUN }}
  sync500:
    runs-on: ubuntu-24.04
    needs:
      - image_lists
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.image_lists.outputs.image_to_sync500) }}
    container:
      image: quay.io/skopeo/stable:v1.16.1
    steps:
      - uses: actions/checkout@master
      - name: Login to registries
        run: |
          skopeo login --username ${{ secrets.DOCKERHUB_USERNAME }} --password ${{ secrets.DOCKERHUB_PASSWORD }} docker.io
          skopeo login --username ${{ secrets.SIGHUP_REGISTRY_USERNAME }} --password ${{ secrets.SIGHUP_REGISTRY_PASSWORD }} registry.sighup.io
        env:
          REGISTRY_AUTH_FILE: /tmp/auth.json
      - name: sync images with skopeo
        uses: ./.github/actions/skopeo-sync
        with:
          source: ${{ matrix.image.source }}
          tag: ${{ matrix.image.tag }}
          destination: ${{ matrix.image.destination }}
          multi-arch: ${{ matrix.image.multi-arch }}
          registry_auth_file: /tmp/auth.json
          dry_run: ${{ env.DRY_RUN }}
  sync750:
    runs-on: ubuntu-24.04
    needs:
      - image_lists
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.image_lists.outputs.image_to_sync750) }}
    container:
      image: quay.io/skopeo/stable:v1.16.1
    steps:
      - uses: actions/checkout@master
      - name: Login to registries
        run: |
          skopeo login --username ${{ secrets.DOCKERHUB_USERNAME }} --password ${{ secrets.DOCKERHUB_PASSWORD }} docker.io
          skopeo login --username ${{ secrets.SIGHUP_REGISTRY_USERNAME }} --password ${{ secrets.SIGHUP_REGISTRY_PASSWORD }} registry.sighup.io
        env:
          REGISTRY_AUTH_FILE: /tmp/auth.json
      - name: sync images with skopeo
        uses: ./.github/actions/skopeo-sync
        with:
          source: ${{ matrix.image.source }}
          tag: ${{ matrix.image.tag }}
          destination: ${{ matrix.image.destination }}
          multi-arch: ${{ matrix.image.multi-arch }}
          registry_auth_file: /tmp/auth.json
          dry_run: ${{ env.DRY_RUN }}
  sync1000:
    runs-on: ubuntu-24.04
    needs:
      - image_lists
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.image_lists.outputs.image_to_sync1000) }}
    container:
      image: quay.io/skopeo/stable:v1.16.1
    steps:
      - uses: actions/checkout@master
      - name: Login to registries
        run: |
          skopeo login --username ${{ secrets.DOCKERHUB_USERNAME }} --password ${{ secrets.DOCKERHUB_PASSWORD }} docker.io
          skopeo login --username ${{ secrets.SIGHUP_REGISTRY_USERNAME }} --password ${{ secrets.SIGHUP_REGISTRY_PASSWORD }} registry.sighup.io
        env:
          REGISTRY_AUTH_FILE: /tmp/auth.json
      - name: sync images with skopeo
        uses: ./.github/actions/skopeo-sync
        with:
          source: ${{ matrix.image.source }}
          tag: ${{ matrix.image.tag }}
          destination: ${{ matrix.image.destination }}
          multi-arch: ${{ matrix.image.multi-arch }}
          registry_auth_file: /tmp/auth.json
          dry_run: ${{ env.DRY_RUN }}
  sync1250:
    runs-on: ubuntu-24.04
    needs:
      - image_lists
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.image_lists.outputs.image_to_sync1250) }}
    container:
      image: quay.io/skopeo/stable:v1.16.1
    steps:
      - uses: actions/checkout@master
      - name: Login to registries
        run: |
          skopeo login --username ${{ secrets.DOCKERHUB_USERNAME }} --password ${{ secrets.DOCKERHUB_PASSWORD }} docker.io
          skopeo login --username ${{ secrets.SIGHUP_REGISTRY_USERNAME }} --password ${{ secrets.SIGHUP_REGISTRY_PASSWORD }} registry.sighup.io
        env:
          REGISTRY_AUTH_FILE: /tmp/auth.json
      - name: sync images with skopeo
        uses: ./.github/actions/skopeo-sync
        with:
          source: ${{ matrix.image.source }}
          tag: ${{ matrix.image.tag }}
          destination: ${{ matrix.image.destination }}
          multi-arch: ${{ matrix.image.multi-arch }}
          registry_auth_file: /tmp/auth.json
          dry_run: ${{ env.DRY_RUN }}
  sync1500:
    runs-on: ubuntu-24.04
    needs:
      - image_lists
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.image_lists.outputs.image_to_sync1500) }}
    container:
      image: quay.io/skopeo/stable:v1.16.1
    steps:
      - uses: actions/checkout@master
      - name: Login to registries
        run: |
          skopeo login --username ${{ secrets.DOCKERHUB_USERNAME }} --password ${{ secrets.DOCKERHUB_PASSWORD }} docker.io
          skopeo login --username ${{ secrets.SIGHUP_REGISTRY_USERNAME }} --password ${{ secrets.SIGHUP_REGISTRY_PASSWORD }} registry.sighup.io
        env:
          REGISTRY_AUTH_FILE: /tmp/auth.json
      - name: sync images with skopeo
        uses: ./.github/actions/skopeo-sync
        with:
          source: ${{ matrix.image.source }}
          tag: ${{ matrix.image.tag }}
          destination: ${{ matrix.image.destination }}
          multi-arch: ${{ matrix.image.multi-arch }}
          registry_auth_file: /tmp/auth.json
          dry_run: ${{ env.DRY_RUN }}
  build:
    runs-on: ubuntu-24.04
    needs:
      - image_lists
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.image_lists.outputs.image_to_build) }}
    steps:
      - uses: actions/checkout@master
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_TEMP }}
          password: ${{ secrets.DOCKERHUB_PASSWORD_TEMP }}
      - name: Login to SIGHUP new Registry
        uses: docker/login-action@v3
        with:
          registry: registry.sighup.io
          username: ${{ secrets.SIGHUP_REGISTRY_USERNAME }}
          password: ${{ secrets.SIGHUP_REGISTRY_PASSWORD }}
      - name: setup docker build for ${{ matrix.image.destination }}:${{ matrix.image.tag }}
        uses: ./.github/actions/docker-build
        with:
          source: ${{ matrix.image.source }}
          tag: ${{ matrix.image.tag }}
          destination: ${{ matrix.image.destination }}
          platforms: ${{ matrix.image.platforms }}
          module: ${{ matrix.image.module }}
          build_context: ${{ matrix.image.build.context }}
          build_args: ${{ matrix.image.build.args }}
          dry_run: ${{ env.DRY_RUN }}